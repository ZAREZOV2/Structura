name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: structura
          POSTGRES_PASSWORD: structura
          POSTGRES_DB: structura
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U structura -d structura"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://structura:structura@localhost:5432/structura

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Apply migrations
        run: |
          cp .env.example .env
          bun run db:migrate

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build
