name = "structura-api"
main = "src/worker.ts"
compatibility_date = "2024-12-01"
# nodejs_compat provides AsyncLocalStorage (request-scoped DB) and exposes
# [vars] / secrets on process.env.
compatibility_flags = ["nodejs_compat"]

# Cloudflare D1 (serverless SQLite). Create with:
#   bunx wrangler d1 create structura
# then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "structura"
database_id = "REPLACE_WITH_D1_DATABASE_ID"
migrations_dir = "drizzle"

[vars]
# Set to the deployed frontend origin (Cloudflare Pages URL) in production.
WEB_ORIGIN = "http://localhost:5173"

# JWT secrets are NOT stored here. Set them as encrypted secrets:
#   bunx wrangler secret put JWT_ACCESS_SECRET
#   bunx wrangler secret put JWT_REFRESH_SECRET
