services:
  postgres:
    image: postgres:16-alpine
    container_name: structura-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: structura
      POSTGRES_PASSWORD: structura
      POSTGRES_DB: structura
    ports:
      - '5432:5432'
    volumes:
      - structura_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U structura -d structura']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  structura_pgdata:
